<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | JobTracker</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">

      <div class="logo">
        <span class="logo-icon">💼</span>
        <h1>JobTracker</h1>
      </div>

      <h2>Create an account</h2>
      <p class="auth-subtitle">Start tracking your job applications today</p>

      <div class="alert" id="alert"></div>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@email.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" />
      </div>

      <button class="btn btn-primary btn-full" id="registerBtn">Create Account</button>

      <p class="auth-switch">
        Already have an account? <a href="/pages/login.html">Login</a>
      </p>

    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
